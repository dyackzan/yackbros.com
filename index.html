<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="yb.png" />
    <title>Yackbros.com</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="turnstile-site-key" content="">
    <link href="styles/style.css" rel="stylesheet" />
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  </head>
  <script type="module" src="/main.js"></script>
  <body>
  <section class="page page1">
    <div class="hero-copy">
      <h1>Welcome to Yackbros.com</h1>
    </div>
    <div class="photo-gallery" aria-label="Yackbros photo gallery">
      <a class="photo-frame landscape" href="assets/images/yackfam.jpeg" target="_blank" rel="noreferrer">
        <img class="bros-photo" src="assets/images/yackfam.jpeg" alt="The Yack family in front of a city holiday tree">
      </a>
      <a class="photo-frame portrait" href="assets/images/yackbros.jpg" target="_blank" rel="noreferrer">
        <img class="bros-photo" src="assets/images/yackbros.jpg" alt="The Yackbros">
      </a>
      <a class="photo-frame landscape" href="assets/images/california_yackfam.jpg" target="_blank" rel="noreferrer">
        <img class="bros-photo" src="assets/images/california_yackfam.jpg" alt="A large Yack family gathering indoors">
      </a>
      <a class="photo-frame portrait" href="assets/images/with_mom_mom.jpeg" target="_blank" rel="noreferrer">
        <img class="bros-photo" src="assets/images/with_mom_mom.jpeg" alt="Yack family members posing with Mom-Mom indoors">
      </a>
      <a class="photo-frame landscape" href="assets/images/dan_bachelor_party.jpeg" target="_blank" rel="noreferrer">
        <img class="bros-photo" src="assets/images/dan_bachelor_party.jpeg" alt="A group photo from Dan's bachelor party at a restaurant">
      </a>
      <a class="photo-frame portrait" href="assets/images/yackbros_tahoe.jpg" target="_blank" rel="noreferrer">
        <img class="bros-photo" src="assets/images/yackbros_tahoe.jpg" alt="The Yackbros posing at Lake Tahoe">
      </a>
      <a class="photo-frame portrait" href="assets/images/yackbros_ny_christmas.jpeg" target="_blank" rel="noreferrer">
        <img class="bros-photo" src="assets/images/yackbros_ny_christmas.jpeg" alt="The Yackbros posing in front of a Christmas tree in New York">
      </a>
      <a class="photo-frame landscape" href="assets/images/yackfam_ny_dinner.jpg" target="_blank" rel="noreferrer">
        <img class="bros-photo" src="assets/images/yackfam_ny_dinner.jpg" alt="Yack family members gathered for dinner in New York">
      </a>
    </div>
    <button id="scroll-to-comments" class="scroll-button">Comments & Feedback<br>⬇️</button>
  </section>
  <section class="page page2">
    <div class="comments-shell">
      <header class="comments-header">
        <p class="eyebrow">Guestbook</p>
        <h2>Comments & Feedback for the Yackbros</h2>
        <p class="comments-intro">
          Leave a note for the brothers, suggest what the site needs next, or make the case for your favorite Yackbro.
        </p>
      </header>
      <form id="comment-form">
        <label class="sr-only" for="name">Your name</label>
        <input type="text" id="name" name="name" placeholder="Your name" maxlength="80" required />
        <label class="sr-only" for="message">Your comment</label>
        <textarea id="message" name="message" placeholder="Your comment" rows="4" maxlength="1000" required></textarea>
        <div class="honeypot-field" aria-hidden="true">
          <label for="website">Website</label>
          <input type="text" id="website" name="website" tabindex="-1" autocomplete="off" />
        </div>
        <div id="turnstile-container" class="turnstile-container" hidden>
          <div id="turnstile-widget"></div>
        </div>
        <div class="form-actions">
          <p id="form-status" class="form-status" aria-live="polite"></p>
          <button type="submit">Post Comment</button>
        </div>
      </form>
      <div id="comments-container">
        <p id="comments-status" class="comments-status" aria-live="polite">Loading comments...</p>
        <ul id="comments-list"></ul>
      </div>
    </div>
  </section>
  </body>
</html>
