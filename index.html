<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="yb.png" />
    <title>Yackbros.com</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="turnstile-site-key" content="">
    <link href="styles/style.css" rel="stylesheet" />
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  </head>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  <script type="module" src="/main.js"></script>
  <body>
  <section class="page page1">
    <h1>Congrats Dr. Dan! 🎉🎊</h1>
    <div class="photo-container">
      <img class="bros-photo" src="assets/images/yackbros.jpg" alt="The Yackbros">
      <img class="grad-cap" src="assets/images/mortarboard.png" alt="Graduation cap">
    </div>
    <button id="scroll-to-comments" class="scroll-button">Comments & Feedback<br>⬇️</button>
  </section>
  <section class="page page2">
    <div class="comments-shell">
      <header class="comments-header">
        <p class="eyebrow">Guestbook</p>
        <h2>Comments & Feedback for the Yackbros</h2>
        <p class="comments-intro">
          Leave a note for the brothers, suggest what the site needs next, or make the case for your favorite Yackbro.
        </p>
      </header>
      <form id="comment-form">
        <label class="sr-only" for="name">Your name</label>
        <input type="text" id="name" name="name" placeholder="Your name" maxlength="80" required />
        <label class="sr-only" for="message">Your comment</label>
        <textarea id="message" name="message" placeholder="Your comment" rows="4" maxlength="1000" required></textarea>
        <div class="honeypot-field" aria-hidden="true">
          <label for="website">Website</label>
          <input type="text" id="website" name="website" tabindex="-1" autocomplete="off" />
        </div>
        <div id="turnstile-container" class="turnstile-container" hidden>
          <div id="turnstile-widget"></div>
        </div>
        <div class="form-actions">
          <p id="form-status" class="form-status" aria-live="polite"></p>
          <button type="submit">Post Comment</button>
        </div>
      </form>
      <div id="comments-container">
        <p id="comments-status" class="comments-status" aria-live="polite">Loading comments...</p>
        <ul id="comments-list"></ul>
      </div>
    </div>
  </section>
  </body>
</html>
